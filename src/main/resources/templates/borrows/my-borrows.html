<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Borrows | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: #main-navbar}"></div>

<div class="container-fluid mt-3">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container-fluid py-3">
    <h1 class="h3 fw-bold mb-4">
        <i class="bi bi-bookmark-check text-primary me-2"></i>My Borrow History
    </h1>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="my-borrows-table">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Book Title</th>
                        <th>Author</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Return Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${records}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.book.title}"></td>
                        <td th:text="${r.book.author}"></td>
                        <td th:text="${r.borrowDate}"></td>
                        <td>
                            <span th:text="${r.dueDate}"
                                  th:class="${r.status.name() == 'BORROWED' and r.dueDate.isBefore(T(java.time.LocalDate).now())} ? 'text-danger fw-bold' : ''">
                            </span>
                        </td>
                        <td th:text="${r.returnDate ?: '—'}"></td>
                        <td>
                            <span th:text="${r.status}"
                                  th:classappend="${r.status.name() == 'BORROWED'} ? 'badge bg-warning text-dark' :
                                                  (${r.status.name() == 'OVERDUE'} ? 'badge bg-danger' :
                                                  'badge bg-success')"></span>
                        </td>
                        <td>
                            <form th:if="${r.status.name() == 'BORROWED' or r.status.name() == 'OVERDUE'}"
                                  th:action="@{/borrows/{id}/return(id=${r.id})}" method="post">
                                <button type="submit"
                                        class="btn btn-sm btn-success"
                                        onclick="return confirm('Return this book?')">
                                    <i class="bi bi-arrow-return-left"></i> Return
                                </button>
                            </form>
                            <span th:if="${r.status.name() == 'RETURNED'}"
                                  class="text-success small">
                                <i class="bi bi-check-circle"></i> Returned
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${records.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No borrow records yet.
                            <a th:href="@{/books}">Browse books!</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer class="footer mt-5 py-3 bg-dark text-light">
    <div class="container text-center"><span>© 2024 Library Management System</span></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
