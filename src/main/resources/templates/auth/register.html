<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register | Library Management System</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body d-flex align-items-center justify-content-center min-vh-100">

<div class="auth-card card shadow-lg border-0 p-4" style="width:460px;">
    <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill display-4 text-primary"></i>
        <h2 class="fw-bold mt-2">Create Account</h2>
        <p class="text-muted small">Join the Library Management System</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post" id="register-form">

        <!-- Full Name -->
        <div class="mb-3">
            <label for="fullName" class="form-label fw-semibold">Full Name</label>
            <input type="text" id="fullName" th:field="*{fullName}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                   placeholder="John Doe"/>
            <div class="invalid-feedback" th:errors="*{fullName}">Name error</div>
        </div>

        <!-- Username -->
        <div class="mb-3">
            <label for="reg-username" class="form-label fw-semibold">Username</label>
            <input type="text" id="reg-username" th:field="*{username}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   placeholder="johndoe"/>
            <div class="invalid-feedback" th:errors="*{username}">Username error</div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" id="email" th:field="*{email}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="john@example.com"/>
            <div class="invalid-feedback" th:errors="*{email}">Email error</div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="reg-password" class="form-label fw-semibold">Password</label>
            <input type="password" id="reg-password" th:field="*{password}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Min 6 characters"/>
            <div class="invalid-feedback" th:errors="*{password}">Password error</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                   placeholder="Repeat password"/>
            <div class="invalid-feedback" th:errors="*{confirmPassword}">Confirm error</div>
        </div>

        <button type="submit" id="register-btn"
                class="btn btn-success w-100 fw-semibold py-2">
            <i class="bi bi-person-check me-2"></i>Register
        </button>
    </form>

    <hr class="my-3"/>
    <p class="text-center small text-muted mb-0">
        Already have an account?
        <a th:href="@{/login}" class="fw-semibold">Login here</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
