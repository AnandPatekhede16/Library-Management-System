<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Library Management System</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body d-flex align-items-center justify-content-center min-vh-100">

<div class="auth-card card shadow-lg border-0 p-4" style="width:420px;">
    <div class="text-center mb-4">
        <i class="bi bi-book-half display-4 text-primary"></i>
        <h2 class="fw-bold mt-2">LibraryMS</h2>
        <p class="text-muted small">Sign in to your account</p>
    </div>

    <!-- Success / Error messages -->
    <div th:if="${successMsg}" class="alert alert-success small">
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger small">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert-info small">
        <span th:text="${logoutMsg}"></span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" id="login-form">
        <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="Enter username"
                       required autofocus/>
            </div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="Enter password"
                       required/>
            </div>
        </div>

        <button type="submit" id="login-btn"
                class="btn btn-primary w-100 fw-semibold py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
    </form>

    <hr class="my-3"/>
    <p class="text-center small text-muted mb-0">
        Don't have an account?
        <a th:href="@{/register}" class="fw-semibold">Register here</a>
    </p>
    <p class="text-center small text-muted mt-2">
        Default admin: <strong>admin</strong> / <strong>admin123</strong>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
