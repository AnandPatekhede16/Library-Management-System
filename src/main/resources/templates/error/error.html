<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
<div class="error-page">
    <i class="bi bi-exclamation-diamond display-1 text-warning"></i>
    <h1 class="display-5 fw-bold text-dark mt-3"
        th:text="${errorTitle ?: 'Something went wrong'}">Error</h1>
    <p class="text-muted fs-5"
       th:text="${errorMessage ?: 'An unexpected error occurred. Please try again later.'}"></p>
    <div class="mt-4 d-flex gap-2 justify-content-center">
        <a href="/dashboard" class="btn btn-primary">
            <i class="bi bi-house me-1"></i>Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Go Back
        </a>
    </div>
</div>
</body>
</html>
