<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>404 Not Found | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
<div class="text-center p-5">
    <i class="bi bi-emoji-frown display-1 text-muted"></i>
    <h1 class="display-4 fw-bold text-danger mt-3">404</h1>
    <h3 th:text="${errorTitle ?: 'Not Found'}">Not Found</h3>
    <p class="text-muted" th:text="${errorMessage ?: 'The page you are looking for does not exist.'}"></p>
    <a href="/dashboard" class="btn btn-primary mt-3">
        <i class="bi bi-house me-1"></i>Go to Dashboard
    </a>
</div>
</body>
</html>
