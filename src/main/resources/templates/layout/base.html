<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | Library MS' : 'Library Management System'}">Library MS</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
    <!-- Custom styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <!-- Chatbot CSS -->
    <link rel="stylesheet" th:href="@{/css/chatbot.css}"/>
</head>
<body>

<!-- ═══════════════════════ NAVBAR ═══════════════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm" id="main-navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-book-half me-2"></i>LibraryMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}">
                        <i class="bi bi-journals me-1"></i>Books
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">
                        <i class="bi bi-grid-3x3-gap me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/borrows/my}">
                        <i class="bi bi-bookmark-check me-1"></i>My Borrows
                    </a>
                </li>

                <!-- Admin-only links -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/users}">
                                <i class="bi bi-people me-2"></i>Manage Users
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/categories}">
                                <i class="bi bi-tags me-2"></i>Categories
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/borrows/all}">
                                <i class="bi bi-list-check me-2"></i>All Borrows
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/borrows/overdue}">
                                <i class="bi bi-exclamation-triangle me-2"></i>Overdue Books
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>

            <!-- Right-side: username + logout -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ═══════════════════════ FLASH MESSAGES ═══════════════════════ -->
<div class="container-fluid mt-3" th:if="${successMsg != null or errorMsg != null}">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ═══════════════════════ MAIN CONTENT ═══════════════════════ -->
<main class="container-fluid py-4" th:fragment="content">
    <!-- page content inserted here -->
</main>

<!-- ═══════════════════════ FOOTER ═══════════════════════ -->
<footer class="footer mt-auto py-3 bg-dark text-light" th:fragment="footer">
    <div class="container text-center">
        <span>© 2024 Library Management System &nbsp;|&nbsp;
            Built with Spring Boot 3 &amp; Thymeleaf</span>
    </div>
</footer>

<!-- ═══════════════════════ CHATBOT WIDGET ═══════════════════════ -->
<div id="chatbot-widget">
    <button id="chatbot-toggle" aria-label="Open Chat">
        <i class="bi bi-robot"></i>
    </button>
    <div id="chatbot-window">
        <div id="chatbot-header">
            <h5 class="mb-0"><i class="bi bi-robot me-2"></i>AI Librarian</h5>
            <button id="chatbot-close"><i class="bi bi-x-lg"></i></button>
        </div>
        <div id="chatbot-messages"></div>
        <div id="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Ask me anything..." autocomplete="off">
            <button id="chatbot-send"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/app.js}"></script>
<!-- Chatbot JS -->
<script th:src="@{/js/chatbot.js}"></script>
</body>
</html>
