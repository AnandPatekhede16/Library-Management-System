<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Users | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: #main-navbar}"></div>

<div class="container-fluid mt-3">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container-fluid py-3">
    <h1 class="h3 fw-bold mb-4">
        <i class="bi bi-people text-primary me-2"></i>User Management
    </h1>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="users-table">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td class="fw-semibold" th:text="${u.username}"></td>
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span th:each="role : ${u.roles}"
                                  th:text="${role.name}"
                                  th:classappend="${role.name == 'ROLE_ADMIN'} ? 'badge bg-danger me-1' : 'badge bg-info me-1'">
                            </span>
                        </td>
                        <td>
                            <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                            <span th:unless="${u.enabled}" class="badge bg-secondary">Disabled</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm"
                                        th:classappend="${u.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:text="${u.enabled} ? 'Disable' : 'Enable'">
                                </button>
                            </form>
                            <form th:action="@{/admin/users/{id}/promote(id=${u.id})}"
                                  method="post" class="d-inline ms-1">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Promote to Admin?')">
                                    <i class="bi bi-shield-fill-plus"></i> Promote
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer class="footer mt-5 py-3 bg-dark text-light">
    <div class="container text-center"><span>© 2024 Library Management System</span></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
