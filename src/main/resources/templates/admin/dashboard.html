<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: #main-navbar}"></div>

<div class="container-fluid mt-3">
    <!-- Flash messages -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-0">
                <i class="bi bi-speedometer2 text-primary me-2"></i>Admin Dashboard
            </h1>
            <p class="text-muted small mb-0">Welcome back,
                <strong sec:authentication="name"></strong>!</p>
        </div>
        <span class="badge bg-danger fs-6">ADMIN</span>
    </div>

    <!-- Statistics Cards -->
    <div class="row g-4 mb-4">
        <div class="col-xl-2 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm stat-card stat-card-blue h-100">
                <div class="card-body text-center">
                    <i class="bi bi-journals display-5 text-primary mb-2"></i>
                    <h2 class="fw-bold" th:text="${stats.totalBooks}">0</h2>
                    <p class="text-muted mb-0">Total Books</p>
                </div>
            </div>
        </div>
        <div class="col-xl-2 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm stat-card stat-card-green h-100">
                <div class="card-body text-center">
                    <i class="bi bi-people display-5 text-success mb-2"></i>
                    <h2 class="fw-bold" th:text="${stats.totalUsers}">0</h2>
                    <p class="text-muted mb-0">Registered Users</p>
                </div>
            </div>
        </div>
        <div class="col-xl-2 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm stat-card stat-card-orange h-100">
                <div class="card-body text-center">
                    <i class="bi bi-bookmark-check display-5 text-warning mb-2"></i>
                    <h2 class="fw-bold" th:text="${stats.totalBorrowed}">0</h2>
                    <p class="text-muted mb-0">Currently Borrowed</p>
                </div>
            </div>
        </div>
        <div class="col-xl-2 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm stat-card stat-card-red h-100">
                <div class="card-body text-center">
                    <i class="bi bi-exclamation-triangle display-5 text-danger mb-2"></i>
                    <h2 class="fw-bold" th:text="${stats.totalOverdue}">0</h2>
                    <p class="text-muted mb-0">Overdue</p>
                </div>
            </div>
        </div>
        <div class="col-xl-2 col-md-4 col-sm-6">
            <div class="card border-0 shadow-sm stat-card stat-card-purple h-100">
                <div class="card-body text-center">
                    <i class="bi bi-tags display-5 text-purple mb-2"></i>
                    <h2 class="fw-bold" th:text="${stats.totalCategories}">0</h2>
                    <p class="text-muted mb-0">Categories</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="row g-3 mb-4">
        <div class="col-auto">
            <a th:href="@{/books/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Add Book
            </a>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                <i class="bi bi-people me-1"></i> Manage Users
            </a>
        </div>
        <div class="col-auto">
            <a th:href="@{/borrows/overdue}" class="btn btn-outline-danger">
                <i class="bi bi-exclamation-triangle me-1"></i> View Overdue
            </a>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/categories}" class="btn btn-outline-info">
                <i class="bi bi-tags me-1"></i> Categories
            </a>
        </div>
    </div>

    <!-- Recent Borrows Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom">
            <h5 class="fw-semibold mb-0">
                <i class="bi bi-clock-history me-2 text-primary"></i>Recent Borrow Records
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="recent-borrows-table">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Book</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${recentBorrows}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.user.username}"></td>
                        <td th:text="${r.book.title}"></td>
                        <td th:text="${r.borrowDate}"></td>
                        <td th:text="${r.dueDate}"></td>
                        <td>
                            <span th:text="${r.status}"
                                  th:classappend="${r.status.name() == 'BORROWED'} ? 'badge bg-success' :
                                                  (${r.status.name() == 'OVERDUE'} ? 'badge bg-danger' :
                                                  'badge bg-secondary')"></span>
                        </td>
                        <td>
                            <form th:if="${r.status.name() != 'RETURNED'}"
                                  th:action="@{/borrows/{id}/admin-return(id=${r.id})}"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-success"
                                        onclick="return confirm('Mark as returned?')">
                                    Return
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${recentBorrows.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No borrow records yet.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer class="footer mt-auto py-3 bg-dark text-light">
    <div class="container text-center">
        <span>© 2024 Library Management System</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
