<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${book.id != null ? 'Edit Book' : 'Add Book'} + ' | Library MS'">Book Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: #main-navbar}"></div>

<main class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/books}">Books</a></li>
            <li class="breadcrumb-item active"
                th:text="${book.id != null ? 'Edit Book' : 'Add New Book'}"></li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm" style="max-width:700px; margin:0 auto;">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0 fw-semibold">
                <i class="bi bi-book me-2"></i>
                <span th:text="${book.id != null ? 'Edit Book' : 'Add New Book'}">Book Form</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="${book.id != null ? '/books/' + book.id + '/edit' : '/books/add'}"
                  th:object="${book}"
                  method="post" id="book-form">

                <!-- Title -->
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">Title *</label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Book title"/>
                    <div class="invalid-feedback" th:errors="*{title}">Title error</div>
                </div>

                <!-- Author -->
                <div class="mb-3">
                    <label for="author" class="form-label fw-semibold">Author *</label>
                    <input type="text" id="author" th:field="*{author}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'"
                           placeholder="Author name"/>
                    <div class="invalid-feedback" th:errors="*{author}">Author error</div>
                </div>

                <!-- ISBN -->
                <div class="mb-3">
                    <label for="isbn" class="form-label fw-semibold">ISBN *</label>
                    <input type="text" id="isbn" th:field="*{isbn}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'"
                           placeholder="e.g. 978-3-16-148410-0"/>
                    <div class="invalid-feedback" th:errors="*{isbn}">ISBN error</div>
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label for="categoryId" class="form-label fw-semibold">Category *</label>
                    <select id="categoryId" th:field="*{categoryId}"
                            class="form-select"
                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">Category</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{categoryId}">Category error</div>
                </div>

                <!-- Total Copies -->
                <div class="mb-3">
                    <label for="totalCopies" class="form-label fw-semibold">Total Copies *</label>
                    <input type="number" id="totalCopies" th:field="*{totalCopies}"
                           class="form-control" min="1"
                           th:classappend="${#fields.hasErrors('totalCopies')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{totalCopies}">Copies error</div>
                </div>

                <!-- Published Year -->
                <div class="mb-3">
                    <label for="publishedYear" class="form-label fw-semibold">Published Year</label>
                    <input type="number" id="publishedYear" th:field="*{publishedYear}"
                           class="form-control" placeholder="e.g. 2023"/>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label for="description" class="form-label fw-semibold">Description</label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" rows="3"
                              placeholder="Brief description of the book..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" id="save-book-btn"
                            class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${book.id != null ? 'Update Book' : 'Save Book'}">Save</span>
                    </button>
                    <a th:href="@{/books}" class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="footer mt-5 py-3 bg-dark text-light">
    <div class="container text-center"><span>© 2024 Library Management System</span></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
