<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Books | Library MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: #main-navbar}"></div>

<div class="container-fluid mt-3">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container-fluid py-3">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold mb-0">
            <i class="bi bi-journals text-primary me-2"></i>Book Catalogue
        </h1>
        <a th:href="@{/books/add(categoryId=${categoryId})}" sec:authorize="hasRole('ADMIN')"
           class="btn btn-primary" id="add-book-btn">
            <i class="bi bi-plus-circle me-1"></i> Add Book
        </a>
    </div>

    <!-- Search Bar -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/books}" method="get" id="book-search-form"
                  class="row g-2 align-items-end">
                <div class="col-md-10">
                    <label for="keyword" class="form-label fw-semibold">Search Books</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" id="keyword" name="keyword"
                               class="form-control form-control-lg"
                               th:value="${keyword}"
                               placeholder="Search by title or author..."/>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-lg w-100" id="search-btn">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Book Cards Grid -->
    <div class="row g-4">
        <div th:each="book : ${books}" class="col-xl-3 col-lg-4 col-md-6">
            <div class="card h-100 border-0 shadow-sm book-card">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex align-items-start mb-2">
                        <div class="book-icon-wrapper me-3">
                            <i class="bi bi-book display-6 text-primary"></i>
                        </div>
                        <div class="flex-grow-1 overflow-hidden">
                            <h6 class="card-title fw-bold mb-1 text-truncate"
                                th:text="${book.title}">Title</h6>
                            <p class="card-text text-muted small mb-0"
                               th:text="${book.author}">Author</p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <span class="badge bg-light text-dark border me-1"
                              th:text="${book.category.name}">Category</span>
                        <span th:if="${book.availableCopies > 0}"
                              class="badge bg-success">Available</span>
                        <span th:if="${book.availableCopies == 0}"
                              class="badge bg-secondary">Unavailable</span>
                    </div>

                    <p class="text-muted small mb-3"
                       th:text="${book.description != null ? #strings.abbreviate(book.description, 100) : 'No description.'}">
                    </p>

                    <div class="mt-auto">
                        <div class="d-flex gap-2">
                            <a th:href="@{/books/{id}(id=${book.id})}"
                               class="btn btn-sm btn-outline-primary flex-grow-1">
                                <i class="bi bi-eye me-1"></i>View
                            </a>
                            <a th:href="@{/books/{id}(id=${book.id})}"
                               class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-star-fill me-1"></i>Rate
                            </a>
                            <a th:href="@{/books/{id}/edit(id=${book.id})}"
                               sec:authorize="hasRole('ADMIN')"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/books/{id}/delete(id=${book.id})}"
                                  sec:authorize="hasRole('ADMIN')"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this book?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${books.isEmpty()}" class="col-12 text-center py-5">
            <i class="bi bi-search display-1 text-muted"></i>
            <h4 class="text-muted mt-3">No books found.</h4>
            <p class="text-muted">Try a different search keyword.</p>
        </div>
    </div>
</main>

<footer class="footer mt-5 py-3 bg-dark text-light">
    <div class="container text-center"><span>© 2024 Library Management System</span></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
