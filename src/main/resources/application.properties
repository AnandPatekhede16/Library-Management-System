# ─────────────────────────────────────────────────────────────
#  Library Management System – Application Configuration
# ─────────────────────────────────────────────────────────────

# ── Server ──────────────────────────────────────────────────
server.port=8085

# ── Application Name ────────────────────────────────────────
spring.application.name=Library Management System

# ── MySQL DataSource ─────────────────────────────────────────
# Change the database name, username, and password as needed.
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Patekhede@@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ───────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Spring Security ──────────────────────────────────────────
# Default admin credentials (override via DB after first run)
spring.security.user.name=admin
spring.security.user.password=admin

# ── Async / Scheduler ────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5

# ── Logging ──────────────────────────────────────────────────
logging.level.com.library=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO

# ── Socket Server Port (custom property) ─────────────────────
library.socket.port=9090
