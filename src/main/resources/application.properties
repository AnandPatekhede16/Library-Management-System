# ─────────────────────────────────────────────────────────────
#  Library Management System – Application Configuration
#  ⚠️  DO NOT put real passwords here.
#  Use environment variables (${VAR}) for all sensitive values.
#  For local development, create application-local.properties
#  (see .env.example for the list of required variables).
# ─────────────────────────────────────────────────────────────

# ── Server ──────────────────────────────────────────────────
# Render.com injects PORT automatically. Falls back to SERVER_PORT, then 8085.
server.port=${PORT:${SERVER_PORT:8085}}

# ── Local Dev Override (gitignored – safe for real credentials) ──
# If application-local.properties exists, it is loaded automatically.
spring.config.import=optional:classpath:application-local.properties

# ── Application Name ────────────────────────────────────────
spring.application.name=Library Management System

# ── MySQL DataSource ─────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ───────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Spring Security ──────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin

# ── Async / Scheduler ────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5

# ── Logging ──────────────────────────────────────────────────
logging.level.com.library=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO

# ── Socket Server Port (custom property) ─────────────────────
library.socket.port=${SOCKET_PORT:9090}

# ── Email / SMTP (Gmail) ─────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

# ── Fine Configuration ────────────────────────────────────────
library.fine.per-day=${FINE_PER_DAY:20}
